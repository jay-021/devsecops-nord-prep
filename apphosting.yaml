  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  # Note: Firebase App Hosting automatically provides service account credentials
  # No need to manually configure FIREBASE_SERVICE_ACCOUNT_KEY

  # Non-sensitive public environment variables
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyDnfUYqlEWULKF-m5rpV-pHWJkHfLPTbQc"
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: zentype-65eb3.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: zentype-65eb3
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: zentype-65eb3.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "882644740092"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:882644740092:web:b53afb066dd2c4d9a43479
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-EPEB3T44XL
  - variable: NEXT_PUBLIC_FIREBASE_FUNCTIONS_REGION
    value: europe-west4

  # Grant access to secrets in Cloud Secret Manager.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
